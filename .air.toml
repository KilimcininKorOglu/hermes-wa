root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/charon"
  cmd = "go build -o ./tmp/charon ."
  delay = 1000
  exclude_dir = ["tmp", "bin", "docker-data", "uploads", "api_docs", ".git"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
