services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermeswa
      POSTGRES_PASSWORD: hermeswa
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermeswa"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - uploads_data:/app/uploads
    ports:
      - "2121:2121"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2121/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      OUTBOX_API_BASEURL: http://api:2121
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      api:
        condition: service_healthy
    command: ["go", "run", "./cmd/worker/"]

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
  uploads_data:
