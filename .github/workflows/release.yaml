name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Lint
        run: make lint

      # NOTE: goreleaser-cross v1.25.8 ships Go 1.25.x while our module requires
      # Go 1.26. Track upstream for a goreleaser-cross image built against Go 1.26
      # (GitHub Issue: goreleaser/goreleaser-cross — check monthly). Until that
      # image is published, `release --clean` will fail the toolchain check when
      # run locally; the hosted runner here bundles Go 1.26 from setup-go so
      # compilation succeeds but any non-goreleaser Go command inside the
      # container still sees Go 1.25. Do NOT downgrade go.mod to 1.25 to work
      # around this — Go 1.26 stdlib CVEs must stay pinned.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser-cross
          version: v1.25.8
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
