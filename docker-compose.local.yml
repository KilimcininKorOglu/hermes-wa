services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: charon
      POSTGRES_PASSWORD: charon
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charon"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: "2121"
      BASEURL: "0.0.0.0"
      CORS_ALLOW_ORIGINS: "http://localhost:3000,http://localhost:8080,http://localhost:5174"
      PHONE_COUNTRY_CODE: "90"
      CHARON_ENABLE_WEBSOCKET_INCOMING_MSG: "false"
      CHARON_ENABLE_WEBHOOK: "false"
      CHARON_TYPING_DELAY_MIN: "1"
      CHARON_TYPING_DELAY_MAX: "3"
      ALLOW_9_DIGIT_PHONE_NUMBER: "false"
      JWT_ACCESS_TOKEN_EXPIRY: 1h
      JWT_REFRESH_TOKEN_EXPIRY: 168h
      MAX_REFRESH_TOKENS_PER_USER: "10"
      RATE_LIMIT_PER_SECOND: "10"
      RATE_LIMIT_BURST: "10"
      RATE_LIMIT_WINDOW_MINUTES: "3"
      MAX_FILE_SIZE_IMAGE_MB: "5"
      MAX_FILE_SIZE_VIDEO_MB: "16"
      MAX_FILE_SIZE_AUDIO_MB: "16"
      MAX_FILE_SIZE_DOCUMENT_MB: "100"
      UPLOAD_DIR: ./uploads
      MAX_AVATAR_SIZE_MB: "1"
      MAX_AVATAR_SIZE_KB: "500"
      ALLOWED_AVATAR_TYPES: jpg,jpeg,png,webp
      AVATAR_OUTPUT_FORMAT: webp
      AVATAR_MAX_DIMENSION: "1024"
      AVATAR_MIN_DIMENSION: "100"
      WARMING_WORKER_ENABLED: "false"
      WARMING_WORKER_INTERVAL_SECONDS: "5"
      WARMING_AUTO_REPLY_ENABLED: "false"
      WARMING_AUTO_REPLY_COOLDOWN: "60"
      AI_ENABLED: "false"
      AI_DEFAULT_PROVIDER: gemini
      GEMINI_API_KEY: ""
      GEMINI_DEFAULT_MODEL: gemini-flash-latest
      AI_CONVERSATION_HISTORY_LIMIT: "10"
      AI_DEFAULT_TEMPERATURE: "0.7"
      AI_DEFAULT_MAX_TOKENS: "150"
      DEFAULT_REPLY_DELAY_MIN: "10"
      DEFAULT_REPLY_DELAY_MAX: "60"
    volumes:
      - .:/app
      - ./docker-data/go-mod:/go/pkg/mod
      - ./docker-data/go-build:/root/.cache/go-build
      - ./docker-data/uploads:/app/uploads
    ports:
      - "2121:2121"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:2121/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      OUTBOX_API_BASEURL: http://api:2121
    volumes:
      - .:/app
      - ./docker-data/go-mod:/go/pkg/mod
      - ./docker-data/go-build:/root/.cache/go-build
    depends_on:
      api:
        condition: service_healthy
    command: ["go", "run", "./cmd/worker/"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'cmd/worker' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    image: node:22-alpine
    working_dir: /app/web
    environment:
      VITE_API_URL: http://api:2121
      VITE_WS_URL: ws://api:2121
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app/web
      - ./docker-data/node-modules:/app/web/node_modules
    ports:
      - "5174:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:5173/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
