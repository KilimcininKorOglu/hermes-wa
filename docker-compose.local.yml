services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermeswa
      POSTGRES_PASSWORD: hermeswa
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermeswa"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - ./docker-data/go-mod:/go/pkg/mod
      - ./docker-data/go-build:/root/.cache/go-build
      - ./docker-data/uploads:/app/uploads
    ports:
      - "2121:2121"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:2121/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      OUTBOX_API_BASEURL: http://api:2121
    volumes:
      - .:/app
      - ./docker-data/go-mod:/go/pkg/mod
      - ./docker-data/go-build:/root/.cache/go-build
    depends_on:
      api:
        condition: service_healthy
    command: ["go", "run", "./cmd/worker/"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'cmd/worker' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    image: node:22-alpine
    working_dir: /app/web
    environment:
      VITE_API_URL: http://api:2121
      VITE_WS_URL: ws://api:2121
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app/web
      - ./docker-data/node-modules:/app/web/node_modules
    ports:
      - "5174:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:5173/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
